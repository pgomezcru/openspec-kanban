# openspec-kanban — Copier template
# Sin preguntas: copia todo el contenido de template/ tal como está.
#
# Uso:
#   copier copy gh:<usuario>/openspec-kanban .
#   copier copy /ruta/local/openspec-kanban .
#   copier update   (para actualizar un proyecto ya configurado)

_subdirectory: template
_answers_file: .copier-answers.yml

_tasks:
  # Añade la entrada al .gitignore del proyecto destino sin sobreescribirlo.
  # Usa Python para compatibilidad cross-platform (Windows / Linux / macOS).
  - - python
    - -c
    - |
      import pathlib
      entry = "openspec/.kanban-mapping"
      p = pathlib.Path(".gitignore")
      content = p.read_text(encoding="utf-8") if p.exists() else ""
      if entry not in content:
          p.write_text(content.rstrip("\n") + "\n" + entry + "\n", encoding="utf-8")
